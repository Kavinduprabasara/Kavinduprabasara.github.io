<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kavindu@portfolio:~/articles$</title>
<link rel="icon"
  href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%234ade80%22 /></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #06090f;
  --bg-main: #0b1120;
  --bg-card: #111a2e;
  --bg-card-hover: #162040;
  --border: #1a2744;
  --border-glow: #2563eb33;
  --green: #4ade80;
  --green-dim: #22c55e;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --amber: #fbbf24;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #475569;
  --nav-bg: rgba(6, 9, 15, 0.8);
  --nav-bg-solid: rgba(6, 9, 15, 0.95);
  --btn-text: var(--bg-deep);
  --scanline: rgba(0, 0, 0, 0.03);
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Inter', sans-serif;
}

:root[data-theme="light"] {
  --bg-deep: #eef2f7;
  --bg-main: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f8fc;
  --border: #dbe3ee;
  --border-glow: #2563eb44;
  --green: #15803d;
  --green-dim: #16a34a;
  --blue: #2563eb;
  --purple: #7c3aed;
  --amber: #b45309;
  --text: #0f172a;
  --text-muted: #475569;
  --text-dim: #94a3b8;
  --nav-bg: rgba(255, 255, 255, 0.82);
  --nav-bg-solid: rgba(255, 255, 255, 0.96);
  --btn-text: #ffffff;
  --scanline: rgba(0, 0, 0, 0.015);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.3s ease, color 0.3s ease;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none;
  z-index: 9999;
}

::selection { background: var(--green); color: var(--bg-deep); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ==================== NAV ==================== */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s, background 0.3s ease;
}
nav.scrolled { border-bottom-color: var(--border); }

.nav-logo {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--green);
  font-weight: 500;
  letter-spacing: -0.02em;
  text-decoration: none;
}
.nav-logo .cursor {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: var(--green);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}

.nav-links { display: flex; gap: 0.25rem; }
.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-muted);
  text-decoration: none;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  transition: all 0.2s;
  letter-spacing: -0.01em;
}
.nav-links a:hover { color: var(--green); background: rgba(74, 222, 128, 0.06); }
.nav-links a.active { color: var(--green); }

.nav-toggle { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; padding: 0.5rem; }

.nav-right { display: flex; align-items: center; gap: 0.5rem; }

.theme-toggle {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: none;
  border: none;
  border-radius: 8px;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.95rem;
  line-height: 1;
  transform: rotate(180deg);
  transition: all 0.2s;
}
.theme-toggle:hover { color: var(--green); background: rgba(74, 222, 128, 0.06); }

/* The bulb glyph: dim (off) by default, lit in light mode */
.theme-toggle .bulb {
  display: block;
  filter: grayscale(1) brightness(0.75) opacity(0.6);
  transition: filter 0.3s ease, text-shadow 0.3s ease;
}
:root[data-theme="light"] .theme-toggle .bulb {
  filter: none;
  text-shadow: 0 0 12px rgba(251, 191, 36, 0.75);
}

/* Light spilling out from the hanging lamp on hover (appears below the bulb) */
.theme-toggle::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 100%; /* sits above locally → below the bulb once the button is flipped */
  transform: translateX(-50%);
  width: 52px;
  height: 64px;
  background: radial-gradient(ellipse 62% 88% at 50% 100%,
              rgba(255, 216, 140, 0.6), rgba(251, 191, 36, 0.16) 55%, transparent 88%);
  filter: blur(5px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.theme-toggle:hover::after { opacity: 1; }

/* ==================== PAGE ==================== */
main {
  flex: 1;
  max-width: 1000px;
  width: 100%;
  margin: 0 auto;
  padding: 8rem 2rem 4rem;
}

.section-header { margin-bottom: 3rem; }
.section-cmd {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}
.section-cmd .prompt { color: var(--green); }
.section-cmd .cmd { color: var(--blue); }
.section-title {
  font-family: var(--font-mono);
  font-size: 1.9rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.section-sub {
  font-size: 0.95rem;
  color: var(--text-muted);
  max-width: 560px;
}
.section-sub a { color: var(--green); text-decoration: none; }
.section-sub a:hover { text-decoration: underline; }

/* ==================== ARTICLES ==================== */
.articles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}
.article-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  transition: all 0.3s;
}
.article-card:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.article-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  background: var(--bg-main);
  border-bottom: 1px solid var(--border);
  display: block;
}
.article-thumb-fallback {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: linear-gradient(135deg, var(--bg-main), var(--bg-card-hover));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
}
.article-body { padding: 1.4rem 1.5rem 1.5rem; display: flex; flex-direction: column; flex: 1; }
.article-date {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
  letter-spacing: 0.02em;
}
.article-title {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 0.6rem;
}
.article-excerpt {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
  flex: 1;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }
.article-tag {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  background: rgba(96, 165, 250, 0.06);
  color: var(--blue);
  border: 1px solid rgba(96, 165, 250, 0.08);
}
.article-more {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--green);
  margin-top: auto;
}

.articles-status {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-muted);
  padding: 2rem 0;
}
.articles-status .prompt { color: var(--green); }
.articles-status a { color: var(--green); text-decoration: none; }
.articles-status a:hover { text-decoration: underline; }

/* Skeleton loading */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.skeleton-line, .skeleton-thumb {
  background: linear-gradient(90deg, var(--bg-main) 25%, var(--bg-card-hover) 37%, var(--bg-main) 63%);
  background-size: 400% 100%;
  animation: shimmer 1.4s ease infinite;
}
.skeleton-thumb { aspect-ratio: 16 / 9; border-bottom: 1px solid var(--border); }
.skeleton-body { padding: 1.4rem 1.5rem 1.5rem; }
.skeleton-line { height: 12px; border-radius: 4px; margin-bottom: 0.7rem; }
.skeleton-line.short { width: 40%; }
.skeleton-line.title { height: 16px; width: 85%; }

/* ==================== FOOTER ==================== */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
}
footer .prompt { color: var(--green); }

/* ==================== ANIMATIONS ==================== */
@keyframes blink { 50% { opacity: 0; } }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.article-card { animation: fadeInUp 0.5s ease backwards; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  nav { padding: 0 1rem; }
  .nav-links {
    display: none;
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--nav-bg-solid);
    backdrop-filter: blur(20px);
    flex-direction: column;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 0.6rem 1rem; }
  .nav-toggle { display: block; }
  main { padding: 7rem 1.25rem 3rem; }
  .articles-grid { grid-template-columns: 1fr; }
}
</style>
<script>
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) {}
  })();
</script>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <a href="index.html" class="nav-logo">~/kavindu<span class="cursor"></span></a>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="bulb">💡</span></button>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html#about">about</a>
      <a href="index.html#skills">skills</a>
      <a href="index.html#experience">experience</a>
      <a href="index.html#projects">projects</a>
      <a href="index.html#research">research</a>
      <a href="articles.html" class="active">articles</a>
      <a href="index.html#contact">contact</a>
    </div>
  </div>
</nav>

<!-- ARTICLES -->
<main>
  <div class="section-header">
    <div class="section-cmd"><span class="prompt">$</span> <span class="cmd">cat</span> articles/*.md</div>
    <h1 class="section-title">Articles</h1>
    <p class="section-sub">Thoughts on software, data, and things I'm learning — published on
      <a href="https://medium.com/@kavinduvijegunasekara" target="_blank" rel="noopener">Medium</a>.</p>
  </div>

  <div class="articles-grid" id="articles-container">
    <!-- Skeletons while loading -->
    <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <span class="prompt">$</span> echo "© 2025 Kavindu Prabasara. All rights reserved."
</footer>

<script>
// Nav scroll effect
const nav = document.getElementById('navbar');
window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 20); });

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
function syncThemeIcon() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  themeToggle.setAttribute('aria-label', isLight ? 'Switch to dark theme (turn light off)' : 'Switch to light theme (turn light on)');
}
syncThemeIcon();
themeToggle.addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', 'light');
  try { localStorage.setItem('theme', isLight ? 'dark' : 'light'); } catch (e) {}
  syncThemeIcon();
});

// Mobile nav toggle
const toggle = document.getElementById('navToggle');
const links = document.getElementById('navLinks');
toggle.addEventListener('click', () => links.classList.toggle('open'));
links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));

// ==================== MEDIUM ARTICLES ====================
const MEDIUM_FEED = 'https://medium.com/feed/@kavinduvijegunasekara';
const PROFILE_URL = 'https://medium.com/@kavinduvijegunasekara';
const ARTICLE_EMOJIS = ['📝', '📊', '🔌', '🎮', '🥽', '💡', '🧠', '⚙️'];

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
}

function firstImage(html) {
  const m = /<img[^>]+src="([^"]+)"/i.exec(html || '');
  return m ? m[1] : null;
}

function formatDate(str) {
  const d = new Date((str || '').replace(' ', 'T'));
  if (isNaN(d)) return '';
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusMessage(html) {
  return `<div class="articles-status">${html}</div>`;
}

async function loadArticles() {
  const container = document.getElementById('articles-container');
  const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(MEDIUM_FEED);
  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.status !== 'ok' || !Array.isArray(data.items)) throw new Error('Feed unavailable');

    const items = data.items;
    if (!items.length) {
      container.innerHTML = statusMessage(`<span class="prompt">$</span> # No articles found yet — check out my <a href="${PROFILE_URL}" target="_blank" rel="noopener">Medium profile</a>.`);
      return;
    }

    container.innerHTML = items.map((item, i) => {
      const img = item.thumbnail || firstImage(item.content) || firstImage(item.description);
      const excerpt = stripHtml(item.description || item.content).slice(0, 200);
      const tags = (item.categories || []).slice(0, 3)
        .map(t => `<span class="article-tag">#${escapeHtml(t)}</span>`).join('');
      const thumb = img
        ? `<img class="article-thumb" src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;article-thumb-fallback&quot;>${ARTICLE_EMOJIS[i % ARTICLE_EMOJIS.length]}</div>'">`
        : `<div class="article-thumb-fallback">${ARTICLE_EMOJIS[i % ARTICLE_EMOJIS.length]}</div>`;
      return `
        <a class="article-card" href="${escapeHtml(item.link)}" target="_blank" rel="noopener" style="animation-delay:${i * 0.06}s">
          ${thumb}
          <div class="article-body">
            <div class="article-date">${escapeHtml(formatDate(item.pubDate))}</div>
            <div class="article-title">${escapeHtml(item.title)}</div>
            <p class="article-excerpt">${escapeHtml(excerpt)}${excerpt.length >= 200 ? '…' : ''}</p>
            <div class="article-tags">${tags}</div>
            <div class="article-more">› read on Medium</div>
          </div>
        </a>`;
    }).join('');
  } catch (err) {
    console.error('Error loading articles:', err);
    container.innerHTML = statusMessage(`<span class="prompt">$</span> # Couldn't load articles right now. Read them directly on my <a href="${PROFILE_URL}" target="_blank" rel="noopener">Medium profile</a>.`);
  }
}

loadArticles();
</script>

</body>
</html>
